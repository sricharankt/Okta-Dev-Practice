<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css" integrity="sha384-9aIt2nRpC12Uk9gS9baDl411NQApFmC26EwAOH8WgZl5MYYxFfc+NcPb1dKGj7Sk" crossorigin="anonymous">
    <title>Simple Web Page</title>
    <style>
      h1 {
        margin: 2em 0;
      }
    </style>

    <!-- ============================================================
         STEP 1: Okta Sign-In Widget CDN — do NOT change these URLs
         ============================================================ -->
    <script
      src="https://global.oktacdn.com/okta-signin-widget/7.40.5/js/okta-sign-in.min.js"
      type="text/javascript">
    </script>
    <link
      href="https://global.oktacdn.com/okta-signin-widget/7.40.5/css/okta-sign-in.min.css"
      type="text/css"
      rel="stylesheet"/>

  </head>
  <body>
    <div class="container">
      <h1 class="text-center">Simple Web Page</h1>

      <div id="messageBox" class="jumbotron">
        You are not logged in.
      </div>

      <!-- where the sign-in form appears -->
      <div id="okta-login-container"></div>

      <button id="logout" class="button" onclick="logout()" style="display: none">
        Logout
      </button>
    </div>

    <script type="text/javascript">

      var oktaConfig = {

        // ============================================================
        // STEP 2: REPLACE THESE THREE VALUES — this is your only job!
        // ============================================================

        issuer: "https://integrator-1473679.okta.com/oauth2/default",
        // Example: "https://integrator-1473679.okta.com/oauth2/default"

        redirectUri: "https://sricharankt.github.io/Okta-Dev-Practice/",
        // Example: "https://effortless-fudge-e248c0.netlify.app/"
        // This must EXACTLY match the redirect URI in your Okta OIDC app

        clientId: "0oa122rs05rgvO09Q698"
        // Example: "0oad8wqe6xe1EaPwt0x7"
        // Found in: Okta Admin → Applications → your app → General tab

        // ============================================================
        // DO NOT add any other customizations — exam says "basic only"
        // ============================================================
      }

      // Handles password recovery OTP routing — leave this as-is
      var searchParams = new URL(window.location.href).searchParams;
      oktaConfig.otp = searchParams.get('otp');
      oktaConfig.state = searchParams.get('state');

      // Initialize the widget
      const oktaSignIn = new OktaSignIn(oktaConfig);

      // Check if user is already logged in
      oktaSignIn.authClient.token.getUserInfo().then(function(user) {
        document.getElementById("messageBox").innerHTML =
          "Hello, " + user.email + "! You are *still* logged in! :)";
        document.getElementById("logout").style.display = 'block';

      }, function(error) {

        // User is not logged in — show the sign-in widget
        oktaSignIn.showSignInToGetTokens({
          el: '#okta-login-container'
        }).then(function(tokens) {

          oktaSignIn.authClient.tokenManager.setTokens(tokens);
          oktaSignIn.remove();

          const idToken = tokens.idToken;
          document.getElementById("messageBox").innerHTML =
            "Hello, " + idToken.claims.email + "! You just logged in! :)";
          document.getElementById("logout").style.display = 'block';

        }).catch(function(err) {
          console.error(err);
        });
      });

      function logout() {
        oktaSignIn.authClient.signOut();
        location.reload();
      }

    </script>
  </body>
</html>
