<!DOCTYPE html>
<html>
<head>
  <title>Okta Sign-In</title>

  <script src="https://global.oktacdn.com/okta-signin-widget/7.0.0/js/okta-sign-in.min.js"></script>
  <link href="https://global.oktacdn.com/okta-signin-widget/7.0.0/css/okta-sign-in.min.css" rel="stylesheet"/>
</head>
<body>

<div id="okta-login-container"></div>

<script>
  var signIn = new OktaSignIn({
    baseUrl: "https://integrator-1473679.okta.com",
    clientId: '0oa11sp6iixWdov1a698',
    redirectUri: "https://sricharankt.github.io/Okta-Dev-Practice/"
    authParams: {
      issuer: 'https://integrator-1473679.okta.com/oauth2/default',
      responseType: ['token', 'id_token'],
      scopes: ['openid', 'profile', 'email']
    }
  });

  signIn.showSignInToGetTokens({
    el: '#okta-login-container'
  }).then(function(tokens) {
    console.log(tokens);
  }).catch(function(err) {
    console.error(err);
  });
</script>

</body>
</html>
